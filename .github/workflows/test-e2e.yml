name: e2e tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  e2e:
    name: e2e tests
    runs-on: ubicloud-standard-4
    env:
      CARGO_INCREMENTAL: 0
      CARGO_TERM_COLOR: always
    steps:
      - uses: actions/checkout@v6

      - name: install deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            libasound2-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            webkit2gtk-driver \
            xvfb \
            dbus-x11

      - uses: dtolnay/rust-toolchain@stable

      # for Swatinem/rust-cache
      - uses: actions/setup-node@v6
        with:
          node-version: 23

      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
          prefix-key: e2e-ubicloud
          workspaces: src-tauri -> target

      - uses: actions/setup-node@v6
        with:
          node-version: 23

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.12

      - name: cache bun
        uses: actions/cache@v5
        with:
          path: |
            ~/.bun/install/cache
          key: bun-e2e-${{ hashFiles('bun.lock') }}
          restore-keys: |
            bun-e2e-

      - run: bun install --frozen-lockfile

      - name: cache tauri-driver binary
        id: tauri-driver-cache
        uses: actions/cache@v5
        with:
          path: ~/.cargo/bin/tauri-driver
          key: tauri-driver-${{ runner.os }}-${{ runner.arch }}-v1

      - name: install tauri-driver
        if: steps.tauri-driver-cache.outputs.cache-hit != 'true'
        run: cargo install tauri-driver --locked

      - name: run tests
        run: xvfb-run bun run test:e2e
